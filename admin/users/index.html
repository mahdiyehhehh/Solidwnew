<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Users · SolidW Admin</title>
<link rel="icon" href="/assets/img/logo.svg" />
<link rel="stylesheet" href="/assets/css/variables.css" />
<link rel="stylesheet" href="/assets/css/base.css" />
<link rel="stylesheet" href="/assets/css/components.css" />
<link rel="stylesheet" href="/assets/css/animations.css" />
<link rel="stylesheet" href="/assets/css/dashboard.css" />
<link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar admin-sidebar">
    <a href="/admin/index.html" class="landing-logo" style="margin-bottom: var(--space-6);">
      <img src="/assets/img/logo.svg" alt="" />
      <span>SolidW Admin</span>
    </a>

    <nav>
      <a href="/admin/index.html" class="sidebar-link">📊 Dashboard</a>
      <a href="/admin/users/index.html" class="sidebar-link active">👤 Users</a>
      <a href="/admin/businesses/index.html" class="sidebar-link">🏪 Businesses</a>
      <a href="/admin/reservations/index.html" class="sidebar-link">📅 Reservations</a>
    </nav>

    <button id="signOutBtn" class="sidebar-link" style="width:100%; text-align:left; margin-top: var(--space-5);">
      🚪 Sign Out
    </button>
  </aside>

  <main class="main-content page-transition">
    <div class="dashboard-topbar">
      <div>
        <h1>Users</h1>
        <p class="text-muted">All registered accounts.</p>
      </div>
    </div>

    <div class="admin-toolbar">
      <input type="text" id="searchInput" class="admin-search-input" placeholder="Search by email…" />
      <div class="admin-filter-tabs" id="statusTabs">
        <button type="button" class="admin-filter-tab active" data-status="all">All</button>
        <button type="button" class="admin-filter-tab" data-status="active">Active</button>
        <button type="button" class="admin-filter-tab" data-status="suspended">Suspended</button>
      </div>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr>
            <th>User</th>
            <th>Plan</th>
            <th>Status</th>
            <th>Businesses</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
      </table>
      <div id="emptyUsers" class="empty-state" style="display:none;">
        <h3>No users found</h3>
      </div>
    </div>
  </main>
</div>

<script type="module" src="./users.js"></script>
</body>
</html>
