<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Businesses · SolidW Admin</title>
<link rel="icon" href="/assets/img/logo.svg" />
<link rel="stylesheet" href="/assets/css/variables.css" />
<link rel="stylesheet" href="/assets/css/base.css" />
<link rel="stylesheet" href="/assets/css/components.css" />
<link rel="stylesheet" href="/assets/css/animations.css" />
<link rel="stylesheet" href="/assets/css/dashboard.css" />
<link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar admin-sidebar">
    <a href="/admin/index.html" class="landing-logo" style="margin-bottom: var(--space-6);">
      <img src="/assets/img/logo.svg" alt="" />
      <span>SolidW Admin</span>
    </a>

    <nav>
      <a href="/admin/index.html" class="sidebar-link">📊 Dashboard</a>
      <a href="/admin/users/index.html" class="sidebar-link">👤 Users</a>
      <a href="/admin/businesses/index.html" class="sidebar-link active">🏪 Businesses</a>
      <a href="/admin/reservations/index.html" class="sidebar-link">📅 Reservations</a>
    </nav>

    <button id="signOutBtn" class="sidebar-link" style="width:100%; text-align:left; margin-top: var(--space-5);">
      🚪 Sign Out
    </button>
  </aside>

  <main class="main-content page-transition">
    <div class="dashboard-topbar">
      <div>
        <h1>Businesses</h1>
        <p class="text-muted">Every business page on the platform.</p>
      </div>
    </div>

    <div class="admin-toolbar">
      <input type="text" id="searchInput" class="admin-search-input" placeholder="Search by name or slug…" />
      <div class="admin-filter-tabs" id="statusTabs">
        <button type="button" class="admin-filter-tab active" data-status="all">All</button>
        <button type="button" class="admin-filter-tab" data-status="published">Published</button>
        <button type="button" class="admin-filter-tab" data-status="draft">Draft</button>
      </div>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr>
            <th>Business</th>
            <th>Owner</th>
            <th>Status</th>
            <th>Bookings</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="businessesTableBody"></tbody>
      </table>
      <div id="emptyBusinesses" class="empty-state" style="display:none;">
        <h3>No businesses found</h3>
      </div>
    </div>
  </main>
</div>

<div id="deleteModalOverlay" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3>Delete this business?</h3>
    <p class="text-muted">This permanently removes its services, hours, gallery, and reservations. This cannot be undone.</p>
    <div style="display:flex; gap: var(--space-3); margin-top: var(--space-5);">
      <button type="button" class="btn btn-danger btn-block" id="confirmDeleteBtn">Delete</button>
      <button type="button" class="btn btn-outline" id="cancelDeleteBtn">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="./businesses.js"></script>
</body>
</html>
