<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password · SolidW</title>
<link rel="icon" href="/assets/img/logo.svg" />
<link rel="stylesheet" href="/assets/css/variables.css" />
<link rel="stylesheet" href="/assets/css/base.css" />
<link rel="stylesheet" href="/assets/css/components.css" />
<link rel="stylesheet" href="/assets/css/animations.css" />
<link rel="stylesheet" href="/assets/css/auth.css" />
</head>
<body>
<div class="auth-page">
  <div class="card auth-card page-transition">
    <a href="/index.html" class="auth-logo">
      <img src="/assets/img/logo.svg" alt="" />
      <span>SolidW</span>
    </a>

    <!-- Step 1: request reset email -->
    <div id="requestStep">
      <h1>Reset your password</h1>
      <p class="auth-subtitle">We'll email you a secure reset link.</p>

      <div id="requestError" class="auth-error-banner" style="display:none;" role="alert"></div>
      <div id="requestSuccess" class="auth-success-banner" style="display:none;" role="status"></div>

      <form id="requestForm" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="requestBtn">
          <span id="requestLabel">Send Reset Link</span>
        </button>
      </form>
    </div>

    <!-- Step 2: shown only when arriving via the emailed reset link -->
    <div id="updateStep" style="display:none;">
      <h1>Set a new password</h1>
      <p class="auth-subtitle">Choose a new password for your account.</p>

      <div id="updateError" class="auth-error-banner" style="display:none;" role="alert"></div>

      <form id="updateForm" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmNewPassword">Confirm New Password</label>
          <input type="password" id="confirmNewPassword" name="confirmNewPassword" autocomplete="new-password" minlength="8" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="updateBtn">
          <span id="updateLabel">Update Password</span>
        </button>
      </form>
    </div>

    <div class="auth-footer-link">
      <a href="/auth/login/index.html">Back to login</a>
    </div>
  </div>
</div>

<script type="module" src="./reset.js"></script>
</body>
</html>
