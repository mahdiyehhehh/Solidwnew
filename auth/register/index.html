<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account · SolidW</title>
<meta name="description" content="Create your free SolidW account and launch your booking page in minutes." />
<link rel="icon" href="/assets/img/logo.svg" />
<link rel="stylesheet" href="/assets/css/variables.css" />
<link rel="stylesheet" href="/assets/css/base.css" />
<link rel="stylesheet" href="/assets/css/components.css" />
<link rel="stylesheet" href="/assets/css/animations.css" />
<link rel="stylesheet" href="/assets/css/auth.css" />
</head>
<body>
<div class="auth-page">
  <div class="card auth-card page-transition">
    <a href="/index.html" class="auth-logo">
      <img src="/assets/img/logo.svg" alt="" />
      <span>SolidW</span>
    </a>

    <h1>Create your account</h1>
    <p class="auth-subtitle">Start free — upgrade any time.</p>

    <div id="errorBanner" class="auth-error-banner" style="display:none;" role="alert"></div>
    <div id="successBanner" class="auth-success-banner" style="display:none;" role="status"></div>

    <form id="registerForm" class="auth-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required />
        <span class="form-hint">At least 8 characters.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" minlength="8" required />
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
        <span id="submitLabel">Create Account</span>
      </button>
    </form>

    <div class="auth-footer-link">
      Already have an account? <a href="/auth/login/index.html">Log in</a>
    </div>
  </div>
</div>

<script type="module" src="/auth/register/register.js"></script>
</body>
</html>
