<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Opening Hours · SolidW</title>
<link rel="icon" href="/assets/img/logo.svg" />
<link rel="stylesheet" href="/assets/css/variables.css" />
<link rel="stylesheet" href="/assets/css/base.css" />
<link rel="stylesheet" href="/assets/css/components.css" />
<link rel="stylesheet" href="/assets/css/animations.css" />
<link rel="stylesheet" href="/assets/css/dashboard.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <a href="/index.html" class="landing-logo" style="margin-bottom: var(--space-6);">
      <img src="/assets/img/logo.svg" alt="" />
      <span>SolidW</span>
    </a>

    <nav>
      <a href="/dashboard/index.html" class="sidebar-link">📊 Dashboard</a>
      <a href="/dashboard/business/index.html" class="sidebar-link">🏪 Business</a>
      <a href="/dashboard/gallery/index.html" class="sidebar-link">🖼️ Gallery</a>
      <a href="/dashboard/services/index.html" class="sidebar-link">📋 Services</a>
      <a href="/dashboard/hours/index.html" class="sidebar-link active">🕒 Opening Hours</a>
      <a href="/dashboard/reservations/index.html" class="sidebar-link">📅 Reservations</a>
      <a href="/dashboard/qrcode/index.html" class="sidebar-link">🔗 QR Code</a>
      <a href="/dashboard/settings/index.html" class="sidebar-link">⚙️ Settings</a>
    </nav>

    <button id="signOutBtn" class="sidebar-link" style="width:100%; text-align:left; margin-top: var(--space-5);">
      🚪 Sign Out
    </button>
  </aside>

  <main class="main-content page-transition">
    <div class="dashboard-topbar">
      <div>
        <h1>Opening Hours</h1>
        <p class="text-muted">Let customers know exactly when you're open.</p>
      </div>
    </div>

    <div class="form-group" style="max-width: 360px;">
      <label class="form-label" for="businessSelect">Business</label>
      <select id="businessSelect"></select>
    </div>

    <div id="noBusinessState" class="empty-state card" style="display:none;">
      <h3>No business yet</h3>
      <p>Create a business first, then come back to set your hours.</p>
      <a href="/dashboard/business/index.html" class="btn btn-primary" style="margin-top: var(--space-4);">Go to Business</a>
    </div>

    <div id="hoursContent" class="card" style="display:none;">
      <div id="hoursTable"></div>

      <div style="margin-top: var(--space-5);">
        <button type="button" class="btn btn-primary" id="saveHoursBtn">
          <span id="saveHoursLabel">Save Hours</span>
        </button>
      </div>
    </div>
  </main>
</div>

<script type="module" src="./hours.js"></script>
</body>
</html>
